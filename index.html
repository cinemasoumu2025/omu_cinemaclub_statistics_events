<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>Redirect</title>

<link rel="preconnect" href="https://drive.google.com">
<link rel="dns-prefetch" href="//drive.google.com">

</head>
<body>

<script>

const GAS_URL =
  "https://script.google.com/macros/s/AKfycbz8d6wEZBrI4jajB-mZzBhgdMyEulp_0Q_1BebKDIZIwjMuDzKgtGdbSKMOEc8jfAxO/exec";

const files = {

  "pdf01A_P_GD_advance":
    "https://drive.google.com/file/d/1lTWjEBX-wsglTdlIA4UleFM2Ty2DLTaO/view?usp=drive_link",

  "pdf01B_P_GD_Today":
    "https://drive.google.com/file/d/1lTWjEBX-wsglTdlIA4UleFM2Ty2DLTaO/view?usp=drive_link",

  "URL10_HP":
    "https://omucinemaclub.sakura.ne.jp/OMU_CINEMA_CLUB/html/",

  "URL11_X":
    "https://twitter.com/omu_cinemaclub",

  "URL12_Instagram":
    "https://www.instagram.com/cinema.club.omu/",

  "URL01A_P_FL_advance":
    "https://online.fliphtml5.com/flszc/ooaq/",

  "URL01B_P_FL_Today":
    "https://online.fliphtml5.com/flszc/ooaq/",

  "URL13_Youtube":
    "https://youtube.com/channel/UC9QhY2jtffByLSzBjnrHzig?feature=shared"
};

const params =
  new URLSearchParams(location.search);

const fileId =
  params.get("id");

const url =
  files[fileId];

if (!url) {

  document.body.innerHTML =
    "ファイルが存在しません";

} else {

  // 超軽量バックグラウンド送信
  navigator.sendBeacon(
    GAS_URL,
    JSON.stringify({
      fileId,
      url,
      userAgent: navigator.userAgent,
      time: Date.now()
    })
  );

  // 即移動
  location.replace(url);
}

</script>

</body>
</html>
